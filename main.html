<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Words Heroes</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  position: relative;
}

header h1 {
  font-size: 24px;
  margin: 0;
  font-weight: bold;
}

.icon {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  background-color: rgba(255,255,255,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 18px;
  color: #333;
}

.sidebar {
  position: fixed;
  top: 60px;
  left: -100%;
  width: 250px;
  height: calc(100% - 60px);
  background-color: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: white;
  padding: 20px;
  transition: left 0.3s ease;
}

.sidebar.active { left: 0; }

.sidebar h2 {
  cursor: pointer;
  user-select: none;
  display: block;
  width: 100%;
  margin: 10px 0;
  font-size: 18px;
  color: white;
  text-align: left;
  padding: 5px 0;
}

.content {
  flex: 1;
  padding: 20px;
}

.game-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

.game-btn {
  padding: 20px;
  margin: 10px 0;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  color: white;
}
.yellow { background-color: #FFD700; }
.blue { background-color: #00BFFF; }
.gray { background-color: #808080; }

/* رسالة تسجيل الدخول */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  color: white;
  padding: 15px 18px;
  border-radius: 10px;
  display: none;
  font-weight: bold;
  width: 300px;
  max-width: 90%;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

.toast button {
  padding: 5px 10px;
  margin-right: 5px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}

.toast #skipBtn {
  background: transparent;
  color: white;
  border: 2px solid white;
}

.toast #loginBtn {
  background: white;
  color: black;
  border: none;
}

/* شريط تقدم عكسي أبيض */
.toast #progress {
  height: 100%;
  background: white;
  width: 100%;
  border-radius: 3px;
  transition: width 0.1s linear;
}
</style>
</head>
<body>

<header>
  <div class="icon" id="menuBtn">&#9776;</div>
  <h1>Words Heroes</h1>
  <div class="icon" id="profileBtn">👤</div>
</header>

<div class="sidebar" id="sidebar">
  <h2 id="homePageBtn">Home Page</h2>
  <h2 id="settingsToggle">Settings</h2>
</div>

<div class="content" id="content">
  <div class="game-title">مرحبا بك في Words Heroes</div>
  <button class="game-btn yellow" onclick="startNormal()">normal Mood</button>
  <button class="game-btn blue" onclick="startOnline()">مباريات أونلاين</button>
  <button class="game-btn gray" onclick="startChampionship()">🏆 Championships</button>
</div>

<div class="toast" id="toast"></div>

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const profileBtn = document.getElementById('profileBtn');
const content = document.getElementById('content');
const toast = document.getElementById('toast');
const settingsToggle = document.getElementById('settingsToggle');
const homePageBtn = document.getElementById('homePageBtn');

let isLoggedIn = false; // تغيير حسب تسجيل الدخول

// السايدبار
menuBtn.onclick = () => sidebar.classList.toggle('active');

settingsToggle.onclick = () => {
  toast.textContent = "تم دخول Settings ✅";
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1500);
  sidebar.classList.remove('active');
  content.innerHTML = `<div class="game-title">Settings</div>`;
};

homePageBtn.onclick = () => {
  sidebar.classList.remove('active');
  content.innerHTML = `
    <div class="game-title">مرحبا بك في Words Heroes</div>
    <button class="game-btn yellow" onclick="startNormal()">normal Mood</button>
    <button class="game-btn blue" onclick="startOnline()">مباريات أونلاين</button>
    <button class="game-btn gray" onclick="startChampionship()">🏆 Championships</button>
  `;
};

profileBtn.onclick = () => { window.location.href = "Profil.html"; };

// الألعاب
function startNormal() { window.location.href = "normal-mood.html"; }
function startOnline() {
  toast.textContent = "سيتم إضافته لاحقاً";
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}
function startChampionship() {
  toast.textContent = "ليست هناك أي بطولة حالياً";
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

// --------------------
// رسالة تسجيل الدخول مع شريط تنازلي عكسي أبيض
// --------------------
function showLoginToast() {
  if(isLoggedIn) return;

  let duration = 5;
  toast.style.display = 'block';
  toast.innerHTML = `
    <div>لم يتم تسجيل الحساب</div>
    <div style="height:4px; background: rgba(255,255,255,0.3); width:100%; position:relative; overflow:hidden; border-radius:3px;">
      <div id="progress" style="height:100%; width:100%;"></div>
    </div>
    <div style="margin-top:5px;">
      <button id="skipBtn">تخطي</button>
      <button id="loginBtn">تسجيل</button>
      <span id="countdown">${duration}s</span>
    </div>
  `;

  const progress = document.getElementById('progress');
  const countdown = document.getElementById('countdown');
  const skipBtn = document.getElementById('skipBtn');
  const loginBtn = document.getElementById('loginBtn');

  let interval = setInterval(() => {
    duration -= 0.1;
    if(duration <= 0){
      clearInterval(interval);
      toast.style.display = 'none';
    } else {
      countdown.textContent = Math.ceil(duration) + 's';
      progress.style.width = (duration/5)*100 + '%';
    }
  }, 100);

  skipBtn.onclick = () => { clearInterval(interval); toast.style.display = 'none'; };
  loginBtn.onclick = () => { clearInterval(interval); window.location.href = "Profil.html"; };
}

// عرض الرسالة كل 10-20 ثانية
setInterval(() => { showLoginToast(); }, 10000 + Math.random()*10000);

</script>
</body>
</html>
