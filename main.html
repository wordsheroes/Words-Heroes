<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Words Heroes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  color: white;
}

/* ===== الهيدر ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  position: relative;
}

header h1 {
  font-size: 24px;
  margin: 0;
  font-weight: bold;
}

.icon {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  background-color: rgba(255,255,255,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 18px;
  color: #333;
}

/* ===== السايدبار ===== */
.sidebar {
  position: fixed;
  top: 60px;
  left: -100%;
  width: 250px;
  height: calc(100% - 60px);
  background-color: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: white;
  padding: 20px;
  transition: left 0.3s ease;
}

.sidebar.active {
  left: 0;
}

.sidebar button, .sidebar h2 {
  cursor: pointer;
  user-select: none;
  display: block;
  width: 100%;
  margin: 10px 0;
  font-size: 18px;
  background: none;
  border: none;
  color: white;
  text-align: left;
  padding: 5px 0;
}

/* ===== المحتوى ===== */
.content {
  flex: 1;
  padding: 20px;
}

.game-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* رسالة toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #808080; /* رمادي */
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  display: none;
  font-weight: bold;
}

/* أزرار الألعاب */
.game-btn {
  padding: 20px;
  margin: 10px 0;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  color: white;
}
.yellow { background-color: #FFD700;}
.blue { background-color: #00BFFF; }
.gray { background-color: #808080;} /* زر Championships */
</style>
</head>

<body>

<header>
  <div class="icon" id="menuBtn">&#9776;</div>
  <h1>Words Heroes</h1>
  <div class="icon" id="profileBtn">👤</div>
</header>

<!-- السايدبار -->
<div class="sidebar" id="sidebar">
  <button id="homePageBtn">Home Page</button>
  <h2 id="settingsToggle">Settings ></h2>
</div>

<!-- المحتوى -->
<div class="content" id="content">
  <div class="game-title">مرحبا بك في Words Heroes</div>
  <button class="game-btn yellow" onclick="startNormal()">normal Mood</button>
  <button class="game-btn blue" onclick="startOnline()">مباريات أونلاين</button>
  <button class="game-btn gray" onclick="startChampionship()">🏆 Championships</button>
</div>

<!-- رسالة toast -->
<div class="toast" id="toast"></div>

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const profileBtn = document.getElementById('profileBtn');
const content = document.getElementById('content');
const toast = document.getElementById('toast');
const settingsToggle = document.getElementById('settingsToggle');
const homePageBtn = document.getElementById('homePageBtn');

// فتح وإغلاق السايدبار
menuBtn.onclick = () => sidebar.classList.toggle('active');

// الضغط على Settings لعرض toast
settingsToggle.onclick = () => {
  toast.textContent = "تم دخول Settings ✅";
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1500);
  sidebar.classList.remove('active');
  content.innerHTML = `<div class="game-title">Settings</div>`;
};

// الضغط على Home Page لعرض الصفحة الرئيسية
homePageBtn.onclick = () => {
  sidebar.classList.remove('active');
  content.innerHTML = `
    <div class="game-title">مرحبا بك في Words Heroes</div>
    <button class="game-btn yellow" onclick="startNormal()">normal Mood</button>
    <button class="game-btn blue" onclick="startOnline()">مباريات أونلاين</button>
    <button class="game-btn gray" onclick="startChampionship()">🏆 Championships</button>
  `;
};

// الضغط على أيقونة البروفايل لفتح صفحة Profil.html
profileBtn.onclick = () => {
  window.location.href = "Profil.html";
};

// دوال الألعاب
function startNormal() {
  content.innerHTML = `<div class="game-title">Normal Mood</div>`;
}

function startOnline() {
  content.innerHTML = `<div class="game-title">مباريات أونلاين</div>`;
}

function startChampionship() {
  toast.textContent = "ليست هناك أي بطولة حالياً";
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}
</script>

</body>
</html>
