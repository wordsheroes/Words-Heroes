<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Words Heroes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
}

header h1 {
  font-size: 24px;
  margin: 0;
  font-weight: bold;
}

.icon {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  background-color: rgba(255,255,255,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 18px;
  color: #333;
}

.sidebar {
  position: fixed;
  top: 60px;
  left: -100%;
  width: 250px;
  height: calc(100% - 60px);
  background-color: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: white;
  padding: 20px;
  transition: left 0.3s ease;
}

.sidebar.active { left: 0; }

.sidebar h2 {
  cursor: pointer;
  user-select: none;
  margin-bottom: 15px;
}

.content {
  flex: 1;
  color: white;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 15px;
  object-fit: cover;
}

.profile-name {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 8px;
}

.profile-level {
  font-size: 18px;
  margin-bottom: 20px;
}

/* رسالة Toast بشكل جديد */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  color: white;
  padding: 15px 18px;
  border-radius: 10px;
  display: none;
  font-weight: bold;
  width: 300px;
  max-width: 90%;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

.toast #progress {
  height: 4px;
  background: white;
  width: 100%;
  border-radius: 3px;
  margin-top: 8px;
  transition: width 0.1s linear;
}
</style>
</head>

<body>

<header>
  <div class="icon" id="menuBtn">&#9776;</div>
  <h1>Profile</h1>
  <div class="icon" id="homeBtn">🏠</div>
</header>

<div class="sidebar" id="sidebar">
  <h2 id="editProfile">Edit Profile ></h2>
  <h2 id="logout">Logout ></h2>
</div>

<div class="content" id="content">
  <img src="profile-placeholder.png" alt="Profile Image" class="profile-img" id="profileImage">
  <div class="profile-name" id="profileName">User</div>
  <div class="profile-level" id="profileLevel">Level 1</div>
</div>

<div class="toast" id="toast">
  <div id="message">لم يتم تسجيل الحساب</div>
  <div id="progress"></div>
</div>

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const toast = document.getElementById('toast');
const homeBtn = document.getElementById('homeBtn');
const profileName = document.getElementById('profileName');
const profileLevel = document.getElementById('profileLevel');

let isLoggedIn = false; // false = غير مسجل، true = مسجل

// فتح وإغلاق السايدبار
menuBtn.onclick = () => sidebar.classList.toggle('active');

// خيارات السايدبار
document.getElementById('editProfile').onclick = () => {
  if(!isLoggedIn){
    showToast("يرجى تسجيل الحساب أولاً");
  } else {
    alert("هنا يمكنك تعديل البروفايل");
  }
  sidebar.classList.remove('active');
};

document.getElementById('logout').onclick = () => {
  if(!isLoggedIn){
    showToast("يرجى تسجيل الحساب أولاً");
  } else {
    alert("تم تسجيل الخروج من الحساب");
  }
  sidebar.classList.remove('active');
};

// الرجوع للصفحة الرئيسية
homeBtn.onclick = () => {
  window.location.href = "main.html"; 
};

// دالة اظهار toast بشكل جديد
function showToast(message, duration=5){
  toast.style.display = 'block';
  document.getElementById('message').textContent = message;

  let time = duration;
  const progress = document.getElementById('progress');
  progress.style.width = '100%';

  const interval = setInterval(() => {
    time -= 0.1;
    if(time <= 0){
      clearInterval(interval);
      toast.style.display = 'none';
    } else {
      progress.style.width = (time/duration)*100 + '%';
    }
  }, 100);
}

// عند تحميل الصفحة
window.onload = () => {
  if(!isLoggedIn){
    profileName.textContent = "User";
    profileLevel.textContent = "Level 1";
    showToast("لم يتم تسجيل الحساب", 5);
  }
};
</script>

</body>
</html>
